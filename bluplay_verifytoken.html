<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
    <title>BluPlay Verification</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        h2 {
            text-align: center;
        }
        input, select {
            display: block;
            margin-bottom: 10px;
            padding: 5px;
            width: 250px;
        }
        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

<h2>
<p>Welcome to BluPlay Verifications!</p>
</h2>

<p>
Use this portal to verify yourself as an SGS (SAV Group of Secrets) member and get a token for secret games of SGS.
</p>

<p>Please fill in the form below:</p>

<form onsubmit="return verifyForm()">

    <label>Name of the game:</label>
    <input type="text" id="game" required>

    <label>Name of the cardholder:</label>
    <select id="name" required>
        <option value="">Select</option>
        <option>Abhijna A</option>
        <option>Vaishnavi S</option>
        <option>Sarvajith N R</option>
    </select>

    <label>Last 4 digits of card number:</label>
    <input type="text" id="card" maxlength="4" required>

    <label>CVV:</label>
    <input type="text" id="cvv" maxlength="3" required>

    <label>Valid until:</label>
    <input type="text" id="date" placeholder="MM/YY or MM/YYYY" required>

    <button type="submit">Submit</button>

</form>

<script>
function verifyForm() {
    let game = document.getElementById("game").value;
    let name = document.getElementById("name").value;
    let card = document.getElementById("card").value;
    let cvv = document.getElementById("cvv").value;
    let date = document.getElementById("date").value;

    // Validation
    if (card === "2013" && cvv === "201" &&
       (date === "10/26" || date === "10/2026")) {

        // Create timestamp
        let now = new Date();
        let timestamp = now.toLocaleString();

        // Create text content
        let content =
`Timestamp of creation of .txt file: ${timestamp}

Name of the game: ${game}
Name of the cardholder: ${name}
Last 4 digits of card number: ${card}
CVV: ${cvv}
Valid until: ${date}

Congratulations, you've successfully submitted the details. Show this file to the Technician to allow to playing room.
`;

        // Create file
        let blob = new Blob([content], { type: "text/plain" });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "BluPlay_Verification.txt";

        // Auto download
        link.click();

        alert("Verification successful! File downloaded.");
    } else {
        alert("Verification failed! Incorrect details.");
    }

    return false; // prevent reload
}
</script>

</body>
</html>
