<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- IMPORTANT for mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;

            /* Centering for all screen sizes */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            width: 90%;              /* responsive width */
            max-width: 400px;        /* limit for large screens */
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;           /* slightly bigger for touch */
            margin-top: 5px;
            box-sizing: border-box;  /* prevents overflow */
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
        }

        .hint {
            font-size: 12px;
            color: gray;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Please login to continue</h2>

    <form onsubmit="return login();">

        <label>
            Username:
            <input type="text" id="username" placeholder="@sav.group" required>
            <div class="hint">@sav.group</div>
        </label>

        <label>
            Password:
            <input type="password" id="password" required>
        </label>

        <button type="submit">Submit</button>

        <div id="error" class="error"></div>

    </form>
</div>

<script>
    function login() {
        const allowedUsers = [
            "verifymadu",
            "captchaadmin",
            "savsgroup"
        ];

        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value;

        username = username.toLowerCase();
        password = password.toLowerCase();

        if (username.endsWith("@sav.group")) {
            username = username.replace("@sav.group", "");
        }

        if (allowedUsers.includes(username) && password === "sav") {
            window.location.href = "https://sarvajith48.github.io/sav/index1.html";
            return false;
        } else {
            document.getElementById("error").textContent =
                "Invalid username or password";
            return false;
        }
    }
</script>

</body>
</html>
